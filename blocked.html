<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>No Tor connection — Onion Container</title>
<style>
  :root { color-scheme: light dark; }
  body {
    max-width: 480px;
    margin: 15vh auto 0;
    padding: 0 24px;
    text-align: center;
    font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  .icon { font-size: 40px; margin-bottom: 8px; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  p { color: #666; }
  .url {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
    word-break: break-all;
    background: rgba(127, 127, 127, 0.12);
    border-radius: 6px;
    padding: 8px 10px;
    margin: 16px 0;
    text-align: left;
  }
  button {
    padding: 8px 20px;
    font-size: 14px;
    border-radius: 6px;
    border: none;
    background: #4a3b6b;
    color: white;
    cursor: pointer;
    margin-top: 8px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status { font-size: 13px; color: #888; margin-top: 12px; min-height: 1.2em; }
</style>
</head>
<body>
  <div class="icon">🧅</div>
  <h1>No Tor connection detected</h1>
  <p>This page didn't load because Tor isn't reachable right now. Nothing
     was sent for this request — the Onion container refuses to load pages
     while it can't confirm a working Tor connection.</p>
  <div class="url" id="target-url"></div>
  <p>Start Tor (or Tor Browser) and try again.</p>
  <button id="retry-btn">Retry</button>
  <div id="status"></div>

  <script src="blocked.js"></script>
</body>
</html>
